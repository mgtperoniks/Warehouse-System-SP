# Warehouse System Application (Core Operations)
# Combined PHP 8.3 FPM + Nginx Service

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: warehouse-system-app
    restart: unless-stopped
    ports:
      - "6031:80"
      - "6032:443"
    volumes:
      - warehouse_storage:/var/www/html/storage
      - ./.env:/var/www/html/.env
    env_file:
      - .env
    # The application connects to 'warehouse-db' via the warehouse-net network
    networks:
      - warehouse-net

volumes:
  warehouse_storage:

networks:
  warehouse-net:
    external: true
